document.getElementById("weekSelect").addEventListener("change", loadQuiz);

function loadQuiz() {
const week = document.getElementById("weekSelect").value;
const quizDiv = document.getElementById("quiz");
quizDiv.innerHTML = "";
document.getElementById("result").innerText = "";

if (!week) return;

questions[week].forEach((item, index) => {
let html = `
<div class="mb-4 sm:mb-6 p-3 sm:p-4 rounded-xl border bg-gray-50">
<h3 class="font-semibold text-sm sm:text-base mb-2 sm:mb-3">${index + 1}. ${item.q}</h3>
<div>
`;

item.options.forEach((opt, i) => {
html += `
<label class="block p-2 sm:p-3 text-sm sm:text-base rounded-lg cursor-pointer border mb-2 hover:bg-indigo-100 transition" id="q${index}_opt${i}">
<input type="radio" name="q${index}" value="${i}" class="mr-2">
${opt}
</label>`;
});

html += `</div>
<div id="answer${index}" class="mt-2 text-sm font-medium"></div>
</div>`;

quizDiv.innerHTML += html;
});
}

function submitTest() {
const week = document.getElementById("weekSelect").value;
let score = 0;

questions[week].forEach((item, index) => {

const selected = document.querySelector(`input[name="q${index}"]:checked`);
const answerDiv = document.getElementById(`answer${index}`);

item.options.forEach((opt, i) => {
const label = document.getElementById(`q${index}_opt${i}`);
label.classList.remove("bg-green-200","bg-red-200");
});

if (selected) {
const selectedIndex = parseInt(selected.value);

if (selectedIndex === item.answer) {
score++;
document.getElementById(`q${index}_opt${selectedIndex}`).classList.add("bg-green-200");
answerDiv.innerHTML = "✅ Correct!";
answerDiv.className = "text-green-600 mt-2";
} else {
document.getElementById(`q${index}_opt${selectedIndex}`).classList.add("bg-red-200");
document.getElementById(`q${index}_opt${item.answer}`).classList.add("bg-green-200");
answerDiv.innerHTML = `❌ Wrong! Correct answer: ${item.options[item.answer]}`;
answerDiv.className = "text-red-600 mt-2";
}
} else {
document.getElementById(`q${index}_opt${item.answer}`).classList.add("bg-green-200");
answerDiv.innerHTML = `⚠️ Not attempted. Correct answer: ${item.options[item.answer]}`;
answerDiv.className = "text-yellow-600 mt-2";
}
});

document.getElementById("result").innerHTML =
`🎯 Your Score: <span class="text-indigo-600">${score}</span> / ${questions[week].length}`;
}

</script>
